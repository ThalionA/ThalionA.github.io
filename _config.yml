# Site settings
title: Everest Base Camp Guide
description: A complete Everest Base Camp trek guide — daily logs, full itinerary with maps, gear list, training plan, costs and logistics.
url: "https://thaliona.github.io"
baseurl: ""
lang: en-US

# Build settings
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Author information (optional)
author:
  name: Theoklitos Amvrosiadis
  email: theoamvr@gmail.com

# Social media / link-preview metadata (used by jekyll-seo-tag)
twitter:
  username: theoamvr
  card: summary_large_image

# Default image shown when a page is shared (Open Graph / Twitter card)
defaults:
  - scope:
      path: ""
    values:
      image: /images/everest_lhotse_ama.jpg

# Build settings
markdown: kramdown
permalink: pretty

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed here will be excluded from site processing.
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle
  - vendor/cache
  - vendor/gems
  - vendor/ruby

